<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>非让你喜欢我</title>
    <style>
    body {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }
    
    input {
        height: 30px;
        width: 100px;
        display: block;
        margin: 20px auto;
    }
    
    #background {
        width: 100%;
        height: 100%;
        background-color: black;
        opacity: 0;
        filter: alpha(opacity=0);
        position: absolute;
        display: none;
        top: 0px;
        left: 0px;
        z-index: 1;
        -moz-transition: 0.5s ease-in;
        /* Firefox 4 */
        -webkit-transition: 0.5s ease-in;
        /* Safari and Chrome */
        -o-transition: 0.5s ease-in;
        /* Opera */
    }
    
    #window {
        width: 400px;
        height: 200px;
        background-color: #FF9999;
        position: absolute;
        display: none;
        display: block;
        top: 50%;
        left: 50%;
        margin-left: -200px;
        margin-top: -100px;
        opacity: 0;
        filter: alpha(opacity=0);
        z-index: 2;
        -moz-transition: 0.3s ease-out;
        /* Firefox 4 */
        -webkit-transition: 0.3s ease-out;
        /* Safari and Chrome */
        -o-transition: 0.3s ease-out;
        /* Opera */
    }
    
    h2 {
        height: 30px;
        width: 100%;
        background-color: #FF6666;
        margin-top: 0px;
        cursor: default;
    }
    
    #closeBtn {
        margin: 3px;
        display: block;
        float: right;
        height: 20px;
        width: 20px;
        border: 2px solid #FF6666;
        font: normal normal 19px/20px "microsoft yahei";
        background: #FFCCCC;
        text-align: center;
    }
    
    .options {
        float: left;
        height: 30px;
        width: 150px;
        background: #FFCCCC;
        text-align: center;
        list-style: none;
        margin-left: 10px;
        margin-top: 100px;
        position: relative;
        cursor:default;
        border-radius: 4px;
        font: normal normal 15px/30px "microsoft yahei";
    }
    
    .options:hover{
        background: #FF6666;
    }
    #question {
        width: 100%;
        position: absolute;
        top: 70px;
        text-align: center;
    }
    </style>
    <script src="http://cdn.staticfile.org/jquery/3.2.1/jquery.min.js"></script>
    <script>
    window.onload = function() {

        var oBtn = document.getElementById("btn");
        var oBackground = document.getElementById("background");
        var oWindow = document.getElementById("window");
        var closeBtn = document.getElementById("closeBtn");

        oBtn.onclick = function() {
            // oWindow.style.width = "400px";
            oBackground.style.display = "block";
            oWindow.style.display = "block";
            setTimeout(function() {
                oBackground.style.opacity = "0.5";
                oWindow.style.height = "200px";
                oBackground.style.filter = "alpha(opacity=50)";
                oWindow.style.opacity = "1";
                oWindow.style.filter = "alpha(opacity=100)";

            }, 1);
        };

        closeBtn.onclick = function() {
            oBackground.style.opacity = "0";
            oBackground.style.filter = "alpha(opacity=0)";
            oWindow.style.opacity = "0";
            oWindow.style.filter = "alpha(opacity=0)";
            oWindow.style.height = "200px";
            setTimeout(function() {
                oBackground.style.display = "none";
                oWindow.style.display = "none";

            }, 1000);
            alert("只能喜欢我，不准去相亲！")
        };

        var options = document.getElementsByClassName("options");
        options[0].onclick = function() {
            alert("怎么都得喜欢我！");
        };
        options[1].onclick = function() {
            alert("我就要你喜欢我！");
        };

        options[0].onmouseover = function() {};

        options[1].onmouseover = function() {
            ILikeYou();
        };

        function ILikeYou() {
            var n = Math.ceil(Math.random() * 2);
            if (getStyle(options[1], "top") == "-100px") {
                n = 2
            }
            switch (n) {
                case 1:
                    if (options[0].innerHTML == "不喜欢") {
                        options[0].innerHTML = "喜欢";
                        options[1].innerHTML = "不喜欢";
                    }
                    if (options[1].innerHTML == "不喜欢") {
                        options[1].innerHTML = "喜欢";
                        options[0].innerHTML = "不喜欢";
                    }
                    break;
                case 2:
                    if (getStyle(options[1], "top") == "-100px") {
                        $($(".options")[1]).animate({
                            top: '0px'
                        }, 100)
                    } else {

                        $($(".options")[1]).animate({
                            top: '-100px'
                        }, 100)
                    }
                    break;
            }

        }

        options[0].onmouseout = function() {
            options[0].innerHTML = "喜欢";
            options[1].innerHTML = "不喜欢";
        };

        options[1].onmouseout = function() {
            options[0].innerHTML = "喜欢";
            options[1].innerHTML = "不喜欢";
        };

    };

    function startMove(obj, attr, target) {
        clearInterval(obj.timer);
        obj.timer = setInterval(function() {
            var current = 0;
            if (attr == "opacity") {
                current = Math.round(parseFloat(getStyle(obj, attr)) * 100);
            } else {
                current = parseInt(getStyle(obj, attr));
            }
            var speed = (target - current) / 10;
            speed = speed > 0 ? Math.ceil(speed) : Math.floor(speed);
            if (current == target) {
                clearInterval(obj.timer);
            } else {
                if (attr == "opacity") {
                    obj.style.filter = "alpha(filter:" + (current + speed) + ")";
                    obj.style.opacity = (current + speed) / 100;
                } else {
                    obj.style[attr] = current + speed + "px";
                }
            }
        }, 15);
    }



    function getStyle(obj, attr) {
        if (obj.currentStyle) {
            return obj.currentStyle[attr];
        } else {
            return getComputedStyle(obj, false)[attr];
        }
    }
    </script>
</head>

<body>
    <input id="btn" type="button" value="点我">
    <div id="background">
    </div>
    <div id="window">
        <h2><span id="closeBtn">×</span></h2>
        <p id="question">沙沙小姐姐，你喜欢周哥哥吗？</p>
        <ul>
            <li class="options">喜欢</li>
            <li class="options">不喜欢</li>
        </ul>
    </div>
</body>

</html>
